services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: micro_swe_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    environment:
      WORKSPACE_ROOT: /app/.workspaces
      DOCKER_BIND_CONTAINER_ROOT: /app
      DOCKER_BIND_HOST_ROOT: ${PWD}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  worker:
    build: .
    env_file:
      - .env
    environment:
      WORKSPACE_ROOT: /app/.workspaces
      DOCKER_BIND_CONTAINER_ROOT: /app
      DOCKER_BIND_HOST_ROOT: ${PWD}
    command: python -m app.workers.poller
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres

volumes:
  postgres_data:
